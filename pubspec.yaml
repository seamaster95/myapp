name: stock_new
description: "ระบบจัดการสต็อก PoPoSoy - พัฒนาด้วย Flutter และ Supabase"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '^3.9.0' # อ้างอิงตามเวอร์ชันเดิมในโปรเจกต์ของกัปตัน

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.12.4 # ส่วนสำคัญที่ใช้เชื่อมต่อฐานข้อมูลเดิม

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  # ส่วนที่เพิ่มมาสคอต PoPoSoy เข้าไปในระบบ
  assets:
    - assets/images/poposoy_mascot.png